services:
  - type: web
    name: grid-league
    runtime: node
    buildCommand: cd server && npm install
    startCommand: node server/index.js
    disk:
      name: grid-data
      mountPath: /var/data
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: GRID_DB_PATH
        value: /var/data/grid.sqlite
      - key: JWT_SECRET
        generateValue: true
      - key: GRID_ADMIN_PASSWORD
        sync: false
